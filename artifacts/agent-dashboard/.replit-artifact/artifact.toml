kind = "web"
previewPath = "/"
title = "Agent Dashboard"
version = "1.0.0"
id = "artifacts/agent-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23371

[services.development]
run = "pnpm --filter @workspace/agent-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-dashboard", "run", "build" ]
publicDir = "artifacts/agent-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23371"
BASE_PATH = "/"
